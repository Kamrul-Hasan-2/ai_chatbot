<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 600px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #4285f4 0%, #1e88e5 100%);
            color: white;
            padding: 20px;
            position: relative;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-text {
            flex: 1;
        }

        .greeting {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .status {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.4;
        }

        .message.user .message-bubble {
            background: #4285f4;
            color: white;
            border-bottom-right-radius: 4px;
            margin-left: 40px;
        }

        .message.bot .message-bubble {
            background: #ffffff;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            border: 1px solid #e4e6ea;
            margin-right: 40px;
        }

        .link-buttons {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .link-button {
            display: inline-block;
            width: fit-content;
            background: #0f766e;
            color: #ffffff;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .link-button:hover {
            background: #115e59;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: 60px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            border: 1px solid #e4e6ea;
            margin-right: 40px;
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            background: #90949c;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-4px);
            }
        }

        .chat-input-container {
            padding: 16px;
            background: #ffffff;
            border-top: 1px solid #e4e6ea;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f0f2f5;
            border-radius: 24px;
            padding: 4px;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            background: transparent;
            color: #1c1e21;
        }

        .chat-input::placeholder {
            color: #65676b;
        }

        .send-button {
            width: 36px;
            height: 36px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 16px;
        }

        .send-button:hover {
            background: #3367d6;
        }

        .send-button:disabled {
            background: #bdc1c6;
            cursor: not-allowed;
        }

        .quick-messages {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: #ffffff;
            overflow-x: auto;
            border-bottom: 1px solid #e4e6ea;
        }

        .quick-message {
            padding: 8px 14px;
            background: #f0f2f5;
            color: #1c1e21;
            border: 1px solid #dadde1;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-weight: 500;
        }

        .quick-message:hover {
            background: #4285f4;
            color: white;
            border-color: #4285f4;
        }

        .chat-status {
            padding: 8px 16px;
            text-align: center;
            font-size: 12px;
            color: #65676b;
            background: #f8f9fa;
            border-bottom: 1px solid #e4e6ea;
        }

        .chat-status.connected {
            color: #42b883;
        }

        .chat-status.disconnected {
            color: #e74c3c;
        }

        /* Custom scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #bdc1c6;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #9aa0a6;
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            
            .chat-container {
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-content">
                <div class="avatar">🤖</div>
                <div class="header-text">
                    <h1 class="greeting">Hi there 👋</h1>
                </div>
            </div>
            <div class="status">
                <span class="status-dot"></span>
                <span>Always happy to help</span>
            </div>
        </div>
        <div class="chat-status" id="status">
            Connecting to server...
        </div>
        <div class="chat-messages" id="messages">
            <!-- Messages will appear here -->
        </div>
        <div class="quick-messages">
            <div class="quick-message" onclick="sendQuickMessage('অর্ডার করবো কিভাবে ?')">How to order?</div>
            <div class="quick-message" onclick="sendQuickMessage('Customer Support Number ?')">Support Number</div>
            <div class="quick-message" onclick="sendQuickMessage('ডেলিভারি চার্জ কতো')">Delivery Charge</div>
            <div class="quick-message" onclick="sendQuickMessage('Hi')">Say Hi</div>
        </div>
        <div class="chat-input-container">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="messageInput" 
                    placeholder="Type your message..."
                    onkeypress="handleKeyPress(event)"
                >
                <button class="send-button" onclick="sendMessage()" id="sendButton">
                    ➤
                </button>
            </div>
        </div>
    </div>

    <script>
        // Use current server URL (works for both localhost and remote servers)
        const API_URL = window.location.origin;
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');
        let userId = 'web_user_' + Date.now();

        // Check server connection
        async function checkConnection() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    statusDiv.className = 'chat-status connected';
                    statusDiv.textContent = '✓ Connected to chatbot';
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                statusDiv.className = 'chat-status disconnected';
                statusDiv.textContent = '✗ Server not running. Trying to reconnect...';
            }
        }

        function buildLinkButtons(data) {
            if (Array.isArray(data.link_buttons) && data.link_buttons.length > 0) {
                return data.link_buttons;
            }

            if (!Array.isArray(data.products) || data.products.length === 0) {
                return [];
            }

            const seen = new Set();
            const buttons = [];
            for (const product of data.products) {
                const url = (product?.url || '').trim();
                if (!url || seen.has(url)) {
                    continue;
                }
                seen.add(url);
                buttons.push({ text: 'View this link', url });
            }

            return buttons;
        }

        // Add message to chat
        function addMessage(text, isUser = false, linkButtons = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = text;

            if (!isUser && Array.isArray(linkButtons) && linkButtons.length > 0) {
                const linksWrap = document.createElement('div');
                linksWrap.className = 'link-buttons';

                for (const button of linkButtons) {
                    const url = (button?.url || '').trim();
                    if (!url) {
                        continue;
                    }

                    const anchor = document.createElement('a');
                    anchor.className = 'link-button';
                    anchor.href = url;
                    anchor.target = '_blank';
                    anchor.rel = 'noopener noreferrer';
                    anchor.textContent = (button?.text || 'View this link').trim() || 'View this link';
                    linksWrap.appendChild(anchor);
                }

                if (linksWrap.children.length > 0) {
                    bubbleDiv.appendChild(linksWrap);
                }
            }
            
            messageDiv.appendChild(bubbleDiv);
            messagesContainer.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Show typing indicator
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing-indicator';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.style.display = 'block';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            
            typingDiv.appendChild(indicator);
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Remove typing indicator
        function hideTyping() {
            const typingDiv = document.getElementById('typing-indicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }

        // Send message to API
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Disable input
            messageInput.disabled = true;
            sendButton.disabled = true;

            // Add user message
            addMessage(message, true);
            messageInput.value = '';

            // Show typing
            showTyping();

            try {
                const response = await fetch(`${API_URL}/test`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message
                    })
                });

                const data = await response.json();
                
                // Hide typing
                hideTyping();

                if (data.response) {
                    const linkButtons = buildLinkButtons(data);
                    addMessage(data.response, false, linkButtons);
                } else {
                    addMessage('দুঃখিত, এখন কোনো উত্তর পাওয়া যায়নি। অনুগ্রহ করে আবার চেষ্টা করুন।', false);
                }
            } catch (error) {
                hideTyping();
                addMessage('দুঃখিত, সার্ভারের সাথে সংযোগ হচ্ছে না। কিছুক্ষণ পর আবার চেষ্টা করুন।', false);
                console.error('Error:', error);
            } finally {
                // Re-enable input
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // Send quick message
        function sendQuickMessage(message) {
            messageInput.value = message;
            sendMessage();
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Initialize chat with welcome message
        async function initializeChat() {
            const welcomeText = 'আসসালামু আলাইকুম! আমি কিভাবে আপনাকে সাহায্য করতে পারি?\n\nHello! How can I help you?';
            addMessage(welcomeText, false);

            // Save frontend-initialized welcome message as Bot (2)
            try {
                await fetch(`${API_URL}/save-message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        sender_type: 2,
                        message: welcomeText
                    })
                });
            } catch (error) {
                console.error('Welcome message save failed:', error);
            }
        }

        // Initialize on page load
        initializeChat();
        
        // Check connection on load
        checkConnection();
        
        // Focus input
        messageInput.focus();

        // Recheck connection every 5 seconds
        setInterval(checkConnection, 5000);
    </script>
</body>
</html>
